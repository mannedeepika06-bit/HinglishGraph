<!DOCTYPE html>
<html>
<head>
    <title>🌍 Telugu + English + Hinglish Knowledge Graph</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #45B7D1);
            color: white;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: auto; padding: 20px; }
        h1 { text-align: center; font-size: 3em; margin: 20px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .upload-box { 
            background: rgba(255,255,255,0.15); padding: 40px; border-radius: 25px; 
            text-align: center; backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            margin: 30px 0;
        }
        .language-selector {
            background: rgba(255,255,255,0.2); padding: 15px; border-radius: 15px; 
            margin-bottom: 20px; font-size: 18px;
        }
        input[type="file"], select { 
            padding: 15px 20px; font-size: 18px; border: none; border-radius: 15px; 
            background: white; margin: 10px; width: 300px; 
        }
        button { 
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e); color: white; border: none; 
            padding: 18px 40px; border-radius: 30px; font-size: 20px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,107,107,0.3); transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(255,107,107,0.4); }
        #graph { width: 100%; height: 600px; border-radius: 20px; margin: 30px 0; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); background: rgba(255,255,255,0.1); }
        .results { display: none; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 30px; }
        .box { background: rgba(255,255,255,0.15); padding: 30px; border-radius: 20px; 
            backdrop-filter: blur(10px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
        #loading { display: none; margin-top: 20px; font-size: 1.5em; font-weight: bold; }
        .download-section { text-align: center; margin: 30px 0; display: none; }
        .download-btn { background: #4CAF50 !important; margin: 0 10px; font-size: 18px; }
        .share-btn { background: #2196F3 !important; margin: 0 10px; font-size: 18px; }
        
        /* New Styles for Analytics Dashboard */
        .stats-grid { display: flex; justify-content: space-around; margin-top: 15px; }
        .stat-item { text-align: center; }
        .stat-value { display: block; font-size: 1.8em; font-weight: bold; color: #fff; }
        .stat-label { font-size: 0.9em; opacity: 0.8; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 Telugu + English + Hinglish Knowledge Graph</h1>
        
        <div class="upload-box">
            <div class="language-selector">
                <label>🎤 Select Language:</label><br>
                <select id="langSelect">
                    <option value="auto">🔍 Auto Detect (Hinglish Best)</option>
                    <option value="en-US">🇺🇸 English</option>
                    <option value="te-IN">🇮🇳 Telugu (తెలుగు)</option>
                </select>
            </div>
            <input type="file" id="audioInput" accept="audio/*">
            <br><br>
            <button onclick="buildGraph()">🚀 Build Knowledge Graph</button>
            <div id="loading">⏳ Processing audio... Please wait.</div>
        </div>

        <div id="graph"></div>

        <div class="download-section" id="actionButtons">
            <button class="download-btn" onclick="downloadGraph()">📸 Download Graph PNG</button>
            <button class="share-btn" onclick="copyLink()">🔗 Copy Live Demo Link</button>
        </div>

        <div class="results" id="resultsArea">
            <div class="box">
                <h3>🎤 Detected Speech</h3>
                <p id="speechText" style="font-size: 1.2em; margin-top: 10px; font-style: italic;"></p>
            </div>
            <div class="box">
                <h3>📊 Graph Insights</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="totalConcepts">0</span>
                        <span class="stat-label">Total Concepts</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="totalConnections">0</span>
                        <span class="stat-label">Total Connections</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="mainHub">-</span>
                        <span class="stat-label">Main Hub</span>
                    </div>
                </div>
                <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px;">
                    <p><strong>Top Keywords:</strong> <span id="topKeywords">-</span></p>
                </div>
            </div>
        </div>
    </div>

    <script>
    async function buildGraph() {
        const fileInput = document.getElementById('audioInput');
        const loading = document.getElementById('loading');
        
        if (fileInput.files.length === 0) {
            alert("Please select a file first!");
            return;
        }

        const formData = new FormData();
        formData.append('audio', fileInput.files[0]);
        formData.append('language', document.getElementById('langSelect').value);

        loading.style.display = 'block';

        try {
            const response = await fetch('/process', { method: 'POST', body: formData });
            const data = await response.json();

            if (data.error) {
                alert("Error: " + data.error);
            } else {
                document.getElementById('resultsArea').style.display = 'grid';
                document.getElementById('actionButtons').style.display = 'block';
                
                // Set text and new statistics
                document.getElementById('speechText').innerText = '"' + data.text + '"';
                document.getElementById('totalConcepts').innerText = data.total_concepts;
                document.getElementById('totalConnections').innerText = data.total_connections;
                document.getElementById('mainHub').innerText = data.main_hub;
                document.getElementById('topKeywords').innerText = data.top_keywords.join(', ');

                const graphData = JSON.parse(data.graph);
                Plotly.newPlot('graph', graphData.data, {
                    ...graphData.layout,
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    font: { color: 'white' }
                });
            }
        } catch (e) {
            console.error(e);
            alert("Connection error. Check Railway logs.");
        } finally {
            loading.style.display = 'none';
        }
    }

    function downloadGraph() {
        Plotly.downloadImage('graph', {
            format: 'png', width: 1200, height: 600, 
            filename: 'knowledge_graph_export'
        });
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href);
        alert('✅ Link Copied!');
    }
    </script>
</body>
</html>
